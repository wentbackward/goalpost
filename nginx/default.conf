server {
    listen 3060 ssl;
    server_name fragola.royal-armadillo.ts.net;

    ssl_certificate /etc/nginx/certs/fragola.crt;
    ssl_certificate_key /etc/nginx/certs/fragola.key;

    location / {
        proxy_pass http://postiz:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Rewrite cookie domain from .ts.net to the full hostname
        proxy_cookie_domain .ts.net fragola.royal-armadillo.ts.net;
    }
}

server {
    listen 8443 ssl;
    server_name fragola.royal-armadillo.ts.net;

    ssl_certificate /etc/nginx/certs/fragola.crt;
    ssl_certificate_key /etc/nginx/certs/fragola.key;

    location / {
        proxy_pass http://collector:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
